<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Received</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body { background: #fff5f7; min-height: 100dvh; font-family: system-ui, sans-serif; }</style>
</head>
<body class="flex items-center justify-center p-6 text-center">
  <div class="max-w-sm">
    <h1 class="text-2xl text-[#7f0a1e] mb-3">Payment received</h1>
    <p class="text-[#9b1b30]/70 text-sm mb-6">Your surprise page is being prepared. You will be redirected to your QR code in a few seconds…</p>
    <a href="/dashboard.html" class="text-sm text-red-700 underline">Back to dashboard</a>
  </div>
  <script>
    (function () {
      var params = new URLSearchParams(location.search);
      var draftId =
        params.get('platform_order_id') ||
        params.get('order_id') ||
        params.get('draft') ||
        params.get('id') ||
        sessionStorage.getItem('valentine_draft_id');

      if (draftId && /^v2026-[a-f0-9]+$/i.test(draftId)) {
        setTimeout(function () {
          location.href = '/success/' + encodeURIComponent(draftId);
        }, 2000);
      }
    })();
  </script>
</body>
</html>
