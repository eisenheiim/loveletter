<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Received</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body { background: #fff5f7; min-height: 100dvh; font-family: system-ui, sans-serif; }</style>
</head>
<body class="flex items-center justify-center p-6 text-center">
  <div class="max-w-sm">
    <h1 class="text-2xl text-[#7f0a1e] mb-3">Payment received</h1>
    <p id="status" class="text-[#9b1b30]/70 text-sm mb-6">Preparing your heart-shaped QR code&hellip;</p>
    <a id="qr-link" href="#" class="hidden block w-full py-3 rounded-full bg-gradient-to-r from-red-500 to-red-800 text-white font-medium text-sm mb-3">
      Show my heart QR
    </a>
    <a href="/dashboard.html" class="text-sm text-red-700 underline">Back to dashboard</a>
  </div>
  <script>
    (function () {
      var params = new URLSearchParams(location.search);
      var draftId =
        params.get('platform_order_id') ||
        params.get('order_id') ||
        params.get('draft') ||
        params.get('id') ||
        sessionStorage.getItem('valentine_draft_id');

      var status = document.getElementById('status');
      var link = document.getElementById('qr-link');

      function goSuccess(id) {
        location.href = '/success/' + encodeURIComponent(id);
      }

      if (draftId && /^v2026-[a-f0-9]+$/i.test(draftId)) {
        link.href = '/success/' + encodeURIComponent(draftId);
        link.classList.remove('hidden');
        setTimeout(function () { goSuccess(draftId); }, 2000);
        return;
      }

      status.textContent =
        'Open the dashboard in this browser (same tab you paid from) and click “I’ve paid — show my heart QR”.';
    })();
  </script>
</body>
</html>
