<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sürprizin Hazır!</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: linear-gradient(180deg, #fff5f7, #ffe8ec);
      min-height: 100dvh;
    }
    .card {
      background: rgba(255,255,255,0.92);
      border: 1px solid rgba(220,38,38,0.12);
      box-shadow: 0 8px 32px rgba(127,10,30,0.12);
      border-radius: 1.25rem;
    }
    .qr-frame {
      position: relative;
      width: 12rem;
      height: 12rem;
      margin: 0 auto;
      filter: drop-shadow(0 8px 20px rgba(127,10,30,0.18));
    }
    .qr-frame img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    .wa-btn {
      background: linear-gradient(135deg, #25d366, #128c7e);
    }
  </style>
</head>
<body class="flex items-center justify-center p-6">
  <div class="card max-w-md w-full p-8 text-center">
    <p class="text-sm tracking-[0.2em] uppercase text-red-700/60 mb-3">Ödeme başarılı</p>
    <h1 class="font-['Cormorant_Garamond'] text-3xl text-[#7f0a1e] mb-2">Sürprizin yayında!</h1>
    <p id="subtitle" class="text-[#9b1b30]/70 text-sm mb-6">Kalp QR kodun hazırlanıyor…</p>

    <div id="qr-wrap" class="hidden mb-6">
      <div class="qr-frame">
        <img id="qr-image" alt="Kalp şeklinde QR kod" />
      </div>
      <p class="text-xs text-[#9b1b30]/55 mt-3">QR kodu tarat veya linki paylaş</p>
      <button id="qr-download" type="button" class="inline-block mt-3 text-sm text-red-700 underline">
        Kalp QR Kodunu İndir
      </button>
    </div>

    <div class="space-y-3">
      <a id="whatsapp-share" href="#" target="_blank" rel="noopener"
        class="wa-btn hidden flex items-center justify-center gap-2 w-full py-3 rounded-full text-white font-medium text-sm">
        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/>
          <path d="M12 0C5.373 0 0 5.373 0 12c0 2.625.846 5.059 2.284 7.034L.789 23.492a.75.75 0 00.918.918l4.458-1.495A11.945 11.945 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.75a9.714 9.714 0 01-4.876-1.304l-.349-.207-2.655.891.891-2.655-.207-.349A9.714 9.714 0 012.25 12C2.25 6.9 6.9 2.25 12 2.25S21.75 6.9 21.75 12 17.1 21.75 12 21.75z"/>
        </svg>
        WhatsApp ile Gönder
      </a>
      <a id="site-link" href="#" class="block w-full py-3 rounded-full bg-gradient-to-r from-red-500 to-red-800 text-white font-medium text-sm">
        Sürpriz Sayfasını Aç
      </a>
      <button id="copy-link" type="button" class="block w-full py-3 rounded-full border border-red-300/40 text-[#9b1b30] text-sm">
        Linki Kopyala
      </button>
    </div>
  </div>

  <script>
    (function () {
      const id = location.pathname.split('/').pop();
      const apiUrl = '/api/success/' + encodeURIComponent(id);
      let pollTimer = null;
      let pageData = null;

      function partnerLabel(name) {
        return name ? name : 'sevgiline';
      }

      function showReady(data) {
        pageData = data;
        document.getElementById('subtitle').textContent =
          partnerLabel(data.partnerName) + ' için hazır — QR kodu tarat veya WhatsApp ile gönder.';
        document.getElementById('site-link').href = data.siteUrl;

        if (data.whatsappShareUrl) {
          const wa = document.getElementById('whatsapp-share');
          wa.href = data.whatsappShareUrl;
          wa.classList.remove('hidden');
        }

        if (data.qrCodeUrl) {
          document.getElementById('qr-wrap').classList.remove('hidden');
          document.getElementById('qr-image').src = data.qrCodeUrl;
        }

        document.getElementById('qr-download').addEventListener('click', function () {
          if (!data.qrCodeUrl) return;
          fetch(data.qrCodeUrl)
            .then(function (res) { return res.blob(); })
            .then(function (blob) {
              const url = URL.createObjectURL(blob);
              const a = document.createElement('a');
              a.href = url;
              a.download = 'kalp-qr-' + id + '.png';
              document.body.appendChild(a);
              a.click();
              a.remove();
              URL.revokeObjectURL(url);
            })
            .catch(function () {
              window.open(data.qrCodeUrl, '_blank');
            });
        });

        document.getElementById('copy-link').addEventListener('click', function () {
          navigator.clipboard.writeText(data.siteUrl).then(function () {
            document.getElementById('copy-link').textContent = 'Kopyalandı!';
          });
        });
      }

      function loadSuccess(attempt) {
        fetch(apiUrl)
          .then(function (res) {
            if (res.status === 402) throw new Error('pending');
            if (!res.ok) throw new Error('not-ready');
            return res.json();
          })
          .then(showReady)
          .catch(function (err) {
            if (err.message === 'pending' && attempt < 30) {
              document.getElementById('subtitle').textContent =
                'Ödemen onaylanıyor… (' + (attempt + 1) + '/30)';
              pollTimer = setTimeout(function () {
                loadSuccess(attempt + 1);
              }, 2000);
              return;
            }
            document.getElementById('subtitle').textContent =
              'Ödeme henüz onaylanmadı. Birkaç saniye sonra sayfayı yenile.';
          });
      }

      loadSuccess(0);
      window.addEventListener('beforeunload', function () {
        if (pollTimer) clearTimeout(pollTimer);
      });
    })();
  </script>
</body>
</html>
